naftiko: 1.0.0-alpha2
info:
  label: Squillo Platform API — Executions
  description: 'Squillo Platform API — Executions. 3 operations. Lead operation: List Executions. Self-contained Naftiko capability
    covering one Squillo business surface.'
  tags:
  - Squillo
  - Executions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SQUILLO_API_KEY: SQUILLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-executions
    baseUri: https://api.squillo.io/v1
    description: Squillo Platform API — Executions business capability. Self-contained, no shared references.
    resources:
    - name: executions
      path: /executions
      operations:
      - name: listexecutions
        method: GET
        description: List Executions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflowId
          in: query
          type: string
          description: Filter executions by workflow
        - name: status
          in: query
          type: string
        - name: startDate
          in: query
          type: string
        - name: endDate
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
    - name: executions-executionId
      path: /executions/{executionId}
      operations:
      - name: getexecution
        method: GET
        description: Get Execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: executions-executionId-cancel
      path: /executions/{executionId}/cancel
      operations:
      - name: cancelexecution
        method: POST
        description: Cancel Execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SQUILLO_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-executions-rest
    port: 8080
    description: REST adapter for Squillo Platform API — Executions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/executions
      name: executions
      description: REST surface for executions.
      operations:
      - method: GET
        name: listexecutions
        description: List Executions
        call: platform-executions.listexecutions
        with:
          workflowId: rest.workflowId
          status: rest.status
          startDate: rest.startDate
          endDate: rest.endDate
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/executions/{executionid}
      name: executions-executionid
      description: REST surface for executions-executionId.
      operations:
      - method: GET
        name: getexecution
        description: Get Execution
        call: platform-executions.getexecution
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/executions/{executionid}/cancel
      name: executions-executionid-cancel
      description: REST surface for executions-executionId-cancel.
      operations:
      - method: POST
        name: cancelexecution
        description: Cancel Execution
        call: platform-executions.cancelexecution
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-executions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Squillo Platform API — Executions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-executions
      description: List Executions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-executions.listexecutions
      with:
        workflowId: tools.workflowId
        status: tools.status
        startDate: tools.startDate
        endDate: tools.endDate
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-execution
      description: Get Execution
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-executions.getexecution
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-execution
      description: Cancel Execution
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-executions.cancelexecution
      outputParameters:
      - type: object
        mapping: $.
