naftiko: 1.0.0-alpha2
info:
  label: Squillo Platform API — Variables
  description: 'Squillo Platform API — Variables. 2 operations. Lead operation: List Variables. Self-contained Naftiko capability
    covering one Squillo business surface.'
  tags:
  - Squillo
  - Variables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SQUILLO_API_KEY: SQUILLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-variables
    baseUri: https://api.squillo.io/v1
    description: Squillo Platform API — Variables business capability. Self-contained, no shared references.
    resources:
    - name: variables
      path: /variables
      operations:
      - name: listvariables
        method: GET
        description: List Variables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createvariable
        method: POST
        description: Create Variable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SQUILLO_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-variables-rest
    port: 8080
    description: REST adapter for Squillo Platform API — Variables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/variables
      name: variables
      description: REST surface for variables.
      operations:
      - method: GET
        name: listvariables
        description: List Variables
        call: platform-variables.listvariables
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createvariable
        description: Create Variable
        call: platform-variables.createvariable
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-variables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Squillo Platform API — Variables. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-variables
      description: List Variables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-variables.listvariables
      outputParameters:
      - type: object
        mapping: $.
    - name: create-variable
      description: Create Variable
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-variables.createvariable
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
