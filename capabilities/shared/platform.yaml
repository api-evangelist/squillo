naftiko: "1.0.0-alpha1"

info:
  label: "Squillo Platform API"
  description: "Squillo SaaU integration and automation platform API for managing workflows, connectors, and executions."
  tags:
    - Squillo
    - Integration Platform
    - Workflow Automation
    - No-Code
    - IT Process Automation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SQUILLO_API_TOKEN: SQUILLO_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: squillo-platform
      baseUri: https://api.squillo.io/v1
      description: "Squillo Platform API"
      authentication:
        type: bearer
        token: "{{SQUILLO_API_TOKEN}}"
      resources:
        - name: workflows
          path: /workflows
          description: "Workflow management"
          operations:
            - name: list-workflows
              method: GET
              description: "List all workflow definitions"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by workflow status"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-workflow
              method: POST
              description: "Create a new workflow definition"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
        - name: workflow-by-id
          path: /workflows/{workflowId}
          description: "Individual workflow management"
          operations:
            - name: get-workflow
              method: GET
              description: "Get workflow details"
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-workflow
              method: PUT
              description: "Update a workflow"
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-workflow
              method: DELETE
              description: "Delete a workflow"
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflow-activate
          path: /workflows/{workflowId}/activate
          description: "Workflow activation"
          operations:
            - name: activate-workflow
              method: POST
              description: "Activate a workflow"
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflow-execute
          path: /workflows/{workflowId}/execute
          description: "Manual workflow execution"
          operations:
            - name: execute-workflow
              method: POST
              description: "Manually trigger a workflow execution"
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: executions
          path: /executions
          description: "Execution history"
          operations:
            - name: list-executions
              method: GET
              description: "List workflow executions"
              inputParameters:
                - name: workflowId
                  in: query
                  type: string
                  required: false
                - name: status
                  in: query
                  type: string
                  required: false
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: execution-by-id
          path: /executions/{executionId}
          description: "Individual execution details"
          operations:
            - name: get-execution
              method: GET
              description: "Get execution details"
              inputParameters:
                - name: executionId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: connectors
          path: /connectors
          description: "Integration connectors"
          operations:
            - name: list-connectors
              method: GET
              description: "List available connectors"
              inputParameters:
                - name: category
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: variables
          path: /variables
          description: "Workflow variables"
          operations:
            - name: list-variables
              method: GET
              description: "List workflow variables"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-variable
              method: POST
              description: "Create a workflow variable"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: squillo-platform-api
      resources:
        - path: /v1/workflows
          name: workflows
          description: "Workflow management"
          operations:
            - method: GET
              name: list-workflows
              description: "List workflows"
            - method: POST
              name: create-workflow
              description: "Create workflow"
        - path: /v1/executions
          name: executions
          description: "Execution management"
          operations:
            - method: GET
              name: list-executions
              description: "List executions"
        - path: /v1/connectors
          name: connectors
          description: "Connector catalog"
          operations:
            - method: GET
              name: list-connectors
              description: "List connectors"

    - type: mcp
      port: 9100
      namespace: squillo-platform-mcp
      transport: http
      tools:
        - name: list-workflows
          description: "List all Squillo workflow definitions"
          hints:
            readOnly: true
            idempotent: true
          call: "squillo-platform.list-workflows"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-workflow
          description: "Get Squillo workflow details by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "squillo-platform.get-workflow"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-executions
          description: "List workflow execution history"
          hints:
            readOnly: true
            idempotent: true
          call: "squillo-platform.list-executions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-execution
          description: "Get workflow execution details"
          hints:
            readOnly: true
            idempotent: true
          call: "squillo-platform.get-execution"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connectors
          description: "List available integration connectors"
          hints:
            readOnly: true
            idempotent: true
          call: "squillo-platform.list-connectors"
          outputParameters:
            - type: object
              mapping: "$."
