apis:
  - aid: squillo:squillo-platform
    name: Squillo Platform API
    description: >-
      The Squillo Platform API provides programmatic access to Squillo's
      integration and automation capabilities. Enables developers to manage
      workflows, connectors, integrations, and automation tasks programmatically.
      The API supports creating and managing integration flows, monitoring
      execution status, and configuring system connections.
